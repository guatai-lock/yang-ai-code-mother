spring:
  application:
    name: yang-ai-code-mother-backend
  datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/yang_ai_code_mother
      username:
      password:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
  # mysql
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.guatai.yangaicodemother.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
rag:
  enabled: true
  max-results: 3
  min-score: 0.5
  persistence-path: ${user.dir}/tmp/rag_store.json
  embedding-model-name: BgeSmallZhV15
